<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEXO Store</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f4f4;
text-align:center;
}

header{
background:black;
color:white;
padding:20px;
font-size:24px;
}

.products{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

.product{
background:white;
padding:20px;
border-radius:10px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:black;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#444;
}

</style>
</head>

<body>

<header>
VEXO STORE
</header>

<h2>المنتجات</h2>

<div class="products">

<div class="product">
<h3>ساعة ذكية</h3>
<p>السعر: 40$</p>
<button>شراء</button>
</div>

<div class="product">
<h3>سماعات</h3>
<p>السعر: 25$</p>
<button>شراء</button>
</div>

<div class="product">
<h3>حقيبة</h3>
<p>السعر: 30$</p>
<button>شراء</button>
</div>

</div>

</body>
</html>
