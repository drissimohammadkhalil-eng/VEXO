<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXO | المتجر الاحترافي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-flex">
            <div class="logo">VEXO<span>Store</span></div>
            <div class="nav-icons">
                <button onclick="loginAdmin()" class="admin-lock-btn"><i class="fas fa-lock"></i> الإدارة</button>
                <div class="cart-icon" onclick="toggleSidebar('cart-sidebar')">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="admin-panel" class="admin-section">
            <h3>إضافة منتج جديد</h3>
            <input type="text" id="p-name" class="admin-input" placeholder="اسم المنتج">
            <input type="number" id="p-price" class="admin-input" placeholder="السعر">
            <input type="text" id="p-img" class="admin-input" placeholder="رابط الصورة">
            <button onclick="addNewProduct()" class="btn-buy" style="background:var(--primary)">حفظ المنتج</button>
        </div>

        <div class="products-grid" id="main-products"></div>
    </div>

    <div id="cart-sidebar" class="sidebar">
        <h3>سلة المشتريات</h3><hr><br>
        <div id="cart-items"></div>
        <p class="total-text">مجموع المنتجات: <span id="cart-total">0</span> د.ج</p>
        <button class="btn-buy checkout-main-btn" onclick="openCheckout()">إتمام الطلب</button>
        <button class="btn-buy close-btn" onclick="toggleSidebar('cart-sidebar')">إغلاق</button>
    </div>

    <div id="checkout-sidebar" class="sidebar">
        <h3>معلومات التوصيل</h3><hr><br>
        <input type="text" id="cust-name" class="admin-input" placeholder="الاسم الكامل">
        <input type="tel" id="cust-phone" class="admin-input" placeholder="رقم الهاتف">
        
        <label>الولاية:</label>
        <select id="wilaya-select" class="admin-input" onchange="calculateShipping()">
            <option value="0" data-price="0">-- اختر الولاية --</option>
            <option value="الجزائر" data-price="400">01 - الجزائر (400 د.ج)</option>
            <option value="البليدة" data-price="400">09 - البليدة (400 د.ج)</option>
            <option value="وهران" data-price="600">31 - وهران (600 د.ج)</option>
        </select>

        <div class="shipping-box">
            <p>التوصيل: <span id="shipping-cost">0</span> د.ج</p>
            <p><strong>الإجمالي: <span id="final-total">0</span> د.ج</strong></p>
        </div>
        
        <button class="btn-buy whatsapp-btn" onclick="confirmOrder()">تأكيد عبر واتساب <i class="fab fa-whatsapp"></i></button>
        <button class="btn-buy close-btn" onclick="toggleSidebar('checkout-sidebar')">رجوع</button>
    </div>

    <footer class="main-footer">
        <div class="container">
            <p>© 2026 VEXO Store | جميع الحقوق محفوظة</p>
            <div class="social-links">
                <a href="https://wa.me/213779310866" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.facebook.com/profile.php?id=61588568665394" target="_blank"><i class="fab fa-facebook"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
