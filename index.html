<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXO STORE | المتجر الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #2563eb; --accent: #22c55e; --text: #1e293b; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); direction: rtl; line-height: 1.6; }

        /* الهيدر */
        .header { background: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .logo-img { max-height: 55px; display: block; margin: auto; }

        /* حاوية المنتج */
        .container { max-width: 600px; margin: auto; background: white; min-height: 100vh; padding-bottom: 120px; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .product-img { width: 100%; height: auto; display: block; background: #eee; }
        .product-info { padding: 25px; }
        .price { font-size: 32px; color: var(--main); font-weight: 900; margin-bottom: 15px; }
        
        /* المميزات */
        .features { background: #f0fdf4; padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px solid #dcfce7; }
        .feat-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-weight: 700; }
        .feat-item i { color: var(--accent); }

        /* أزرار الطلب */
        .footer-cta { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); text-align: center; z-index: 2000; }
        .btn-order { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 50px; width: 95%; max-width: 500px; font-size: 22px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-order:disabled { background: #ccc; cursor: not-allowed; }

        /* المودال */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 450px; border-radius: 25px; padding: 25px; position: relative; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; text-align: right; }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/200x60?text=VEXO+STORE'">
        </header>

        <img src="product.png" class="product-img" onerror="this.src='https://via.placeholder.com/600x600?text=Product+Image'">

        <div class="product-info">
            <h1 style="font-size: 26px; font-weight: 900; margin-bottom: 10px;">هاتف ذكي احترافي VEXO</h1>
            <div class="price">35,000 د.ج</div>
            
            <div class="features">
                <div class="feat-item"><i class="fas fa-truck"></i> توصيل سريع لـ 58 ولاية</div>
                <div class="feat-item"><i class="fas fa-check-circle"></i> ضمان الجودة وسعر تنافسي</div>
                <div class="feat-item"><i class="fas fa-money-bill-wave"></i> الدفع عند الاستلام</div>
            </div>

            <p style="color: #64748b;">يرجى ملء الاستمارة أدناه لطلب المنتج. سنتصل بك في أقرب وقت ممكن لتأكيد الطلبية وتحديد موعد الإرسال.</p>
        </div>
    </div>

    <div class="footer-cta">
        <button class="btn-order" onclick="openModal()">اطلب الآن - إضغط هنا</button>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content" id="modal-body">
            <h2 style="text-align: center; margin-bottom: 20px;">تأكيد الطلبية</h2>
            
            <form id="order-form">
                <input type="text" name="الاسم" placeholder="الاسم واللقب بالكامل" required>
                <input type="tel" name="الهاتف" placeholder="رقم الهاتف" required>
                <select name="الولاية" required>
                    <option value="" disabled selected>اختر ولايتك (58 ولاية)</option>
                    <option value="01- أدرار">01- أدرار</option><option value="02- الشلف">02- الشلف</option><option value="03- الأغواط">03- الأغواط</option><option value="04- أم البواقي">04- أم البواقي</option><option value="05- باتنة">05- باتنة</option><option value="06- بجاية">06- بجاية</option><option value="07- بسكرة">07- بسكرة</option><option value="08- بشار">08- بشار</option><option value="09- البليدة">09- البليدة</option><option value="10- البويرة">10- البويرة</option><option value="11- تمنراست">11- تمنراست</option><option value="12- تبسة">12- تبسة</option><option value="13- تلمسان">13- تلمسان</option><option value="14- تيارت">14- تيارت</option><option value="15- تيزي وزو">15- تيزي وزو</option><option value="16- الجزائر العاصمة">16- الجزائر العاصمة</option><option value="17- الجلفة">17- الجلفة</option><option value="18- جيجل">18- جيجل</option><option value="19- سطيف">19- سطيف</option><option value="20- سعيدة">20- سعيدة</option><option value="21- سكيكدة">21- سكيكدة</option><option value="22- سيدي بلعباس">22- سيدي بلعباس</option><option value="23- عنابة">23- عنابة</option><option value="24- قالمة">24- قالمة</option><option value="25- قسنطينة">25- قسنطينة</option><option value="26- المدية">26- المدية</option><option value="27- مستغانم">27- مستغانم</option><option value="28- المسيلة">28- المسيلة</option><option value="29- معسكر">29- معسكر</option><option value="30- ورقلة">30- ورقلة</option><option value="31- وهران">31- وهران</option><option value="32- البيض">32- البيض</option><option value="33- إليزي">33- إليزي</option><option value="34- برج بوعريريج">34- برج بوعريريج</option><option value="35- بومرداس">35- بومرداس</option><option value="36- الطارف">36- الطارف</option><option value="37- تندوف">37- تندوف</option><option value="38- تيسمسيلت">38- تيسمسيلت</option><option value="39- الوادي">39- الوادي</option><option value="40- خنشلة">40- خنشلة</option><option value="41- سوق أهراس">41- سوق أهراس</option><option value="42- تيبازة">42- تيبازة</option><option value="43- ميلة">43- ميلة</option><option value="44- عين الدفلى">44- عين الدفلى</option><option value="45- النعامة">45- النعامة</option><option value="46- عين تموشنت">46- عين تموشنت</option><option value="47- غرداية">47- غرداية</option><option value="48- غليزان">48- غليزان</option><option value="49- تيميمون">49- تيميمون</option><option value="50- برج باجي مختار">50- برج باجي مختار</option><option value="51- أولاد جلال">51- أولاد جلال</option><option value="52- بني عباس">52- بني عباس</option><option value="53- عين صالح">53- عين صالح</option><option value="54- عين قزام">54- عين قزام</option><option value="55- تقرت">55- تقرت</option><option value="56- جنايت">56- جنايت</option><option value="57- المغير">57- المغير</option><option value="58- المنيعة">58- المنيعة</option>
                </select>
                <button type="submit" id="submit-btn" class="btn-order" style="width: 100%; margin-top: 10px;">إرسال الطلب</button>
            </form>
            <button onclick="closeModal()" style="background:none; border:none; color:gray; width:100%; margin-top:15px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('order-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('order-modal').style.display = 'none'; }

        const form = document.getElementById('order-form');
        
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            const formData = new FormData(form);

            try {
                const response = await fetch("https://formspree.io/f/xzdjgjee", {
                    method: "POST",
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    document.getElementById('modal-body').innerHTML = `
                        <div style="text-align:center; padding:20px;">
                            <i class="fas fa-check-circle" style="font-size:60px; color:var(--accent);"></i>
                            <h2 style="margin-top:15px;">شكراً لك!</h2>
                            <p>تم استلام طلبك بنجاح. سنتصل بك قريباً.</p>
                            <button onclick="location.reload()" class="btn-order" style="margin-top:20px; font-size:16px;">العودة للمتجر</button>
                        </div>`;
                } else {
                    alert("حدث خطأ في الإرسال، يرجى المحاولة مرة أخرى.");
                    btn.innerText = "إرسال الطلب";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("تأكد من اتصالك بالإنترنت");
                btn.innerText = "إرسال الطلب";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
