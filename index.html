<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEXO STORE | المتجر الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #2563eb; --accent: #22c55e; --text: #1e293b; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); direction: rtl; overflow-x: hidden; }

        /* الحاوية الرئيسية */
        .container { max-width: 500px; margin: auto; background: white; min-height: 100vh; padding-bottom: 140px; }
        
        /* الهيدر والصور */
        .header { background: white; padding: 10px; text-align: center; border-bottom: 2px solid var(--main); }
        .logo-img { max-height: 50px; width: auto; display: block; margin: auto; }
        .product-img-box { width: 100%; background: #f1f5f9; min-height: 300px; position: relative; }
        .product-img { width: 100%; height: auto; display: block; }

        /* معلومات المنتج */
        .product-info { padding: 20px; }
        .price { font-size: 28px; color: var(--main); font-weight: 900; margin-bottom: 10px; }
        .old-price { font-size: 18px; color: #94a3b8; text-decoration: line-through; margin-right: 10px; }

        .badge-shipping { background: #fef3c7; color: #92400e; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 10px; }

        /* الأزرار الثابتة */
        .footer-cta { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #e2e8f0; z-index: 1000; text-align: center; }
        .btn-order { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; width: 90%; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }

        /* المودال */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; position: relative; }
        
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 16px; text-align: right; -webkit-appearance: none; }
        
        .success-msg { text-align: center; padding: 20px; }
        .success-msg i { font-size: 50px; color: var(--accent); margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/150x50?text=VEXO+STORE'">
        </header>

        <div class="product-img-box">
            <img src="product.png" class="product-img" onerror="this.src='https://via.placeholder.com/500x500?text=اضف+صورة+المنتج+product.png'">
        </div>

        <div class="product-info">
            <span class="badge-shipping">🔥 الأكثر مبيعاً حالياً</span>
            <h1 style="font-size: 22px; font-weight: 900; line-height: 1.4;">هاتف ذكي احترافي VEXO - النسخة الأصلية</h1>
            <div class="price">35,000 د.ج <span class="old-price">42,000 د.ج</span></div>
            
            <div style="margin-top: 15px; padding: 15px; background: #f8fafc; border-radius: 12px;">
                <p>✅ التوصيل متاح لـ 58 ولاية</p>
                <p>✅ ضمان لمدة 12 شهر</p>
                <p>✅ الدفع عند الاستلام (يدي بيد)</p>
            </div>
        </div>
    </div>

    <div class="footer-cta">
        <button class="btn-order" onclick="openModal()">اضغط هنا للطلب الآن</button>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content" id="modal-content-box">
            <h3 style="text-align: center; margin-bottom: 15px;">أدخل معلوماتك للطلب</h3>
            <form id="order-form">
                <input type="text" name="name" placeholder="الاسم واللقب" required>
                <input type="tel" name="phone" placeholder="رقم الهاتف (05/06/07)" required>
                <select name="wilaya" required>
                    <option value="" disabled selected>اختر الولاية</option>
                    <option value="الجزائر العاصمة">الجزائر العاصمة</option>
                    <option value="سطيف">سطيف</option>
                    <option value="وهران">وهران</option>
                    <option value="قسنطينة">قسنطينة</option>
                    <option value="باقي الولايات">باقي الولايات الأخرى (58)</option>
                </select>
                <button type="submit" id="submit-btn" class="btn-order" style="width: 100%; margin-top: 10px;">تأكيد الطلب</button>
            </form>
            <button onclick="closeModal()" style="width: 100%; background: none; border: none; color: #94a3b8; margin-top: 10px; cursor: pointer;">إلغاء</button>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('order-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('order-modal').style.display = 'none'; }

        const form = document.getElementById('order-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            try {
                const response = await fetch("https://formspree.io/f/xzdjgjee", {
                    method: "POST",
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    document.getElementById('modal-content-box').innerHTML = `
                        <div class="success-msg">
                            <i class="fas fa-check-circle"></i>
                            <h2>شكراً لك!</h2>
                            <p>تم استلام طلبك بنجاح. سنتصل بك قريباً للتأكيد.</p>
                            <button onclick="location.reload()" class="btn-order" style="margin-top: 20px;">العودة</button>
                        </div>`;
                } else {
                    throw new Error();
                }
            } catch (err) {
                alert("حدث خطأ. تأكد من الإنترنت وحاول ثانية.");
                btn.innerText = "تأكيد الطلب";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
